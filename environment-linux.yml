name: edge
# Linux x86_64 + NVIDIA GPU (CUDA 11.8), Slurm HPC environment
#
# !! DO NOT use `conda env create` alone — pip deps require extra steps.
# !! Use the setup script instead:
#
#   bash setup_env.sh
#
# The script handles three known issues (see setup_env.sh for details):
#   1. jukemirlib is not on PyPI — installed from GitHub
#   2. setuptools >=70 breaks jukebox build (no pkg_resources) — pinned to <70
#   3. pytorch3d wheel requires --find-links, not --extra-index-url
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch::pytorch=2.1.2
  - pytorch::torchvision=0.16.2
  - pytorch::torchaudio=2.1.2
  - pytorch::pytorch-cuda=11.8
  - numpy<2.0
  - scipy
  - matplotlib
  - tqdm
  - conda-forge::fvcore
  - conda-forge::iopath
  # pip deps below are NOT installed by conda env create (see header).
  # They are installed by setup_env.sh instead.
  - pip:
      - einops
      - "librosa>=0.10"  # 0.9.x uses scipy.signal.hann removed in scipy 1.9+
      - soundfile
      - p_tqdm
      - wandb
      - "accelerate>=0.24,<1.0"
      # jukemirlib: not on PyPI, installed from GitHub by setup_env.sh
      # pytorch3d: installed from fbaipublicfiles wheel by setup_env.sh
